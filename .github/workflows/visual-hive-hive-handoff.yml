name: Visual Hive Hive Handoff

on:
  workflow_run:
    workflows:
      - Visual Hive Trusted Publisher
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  hive-handoff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download Visual Hive artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: visual-hive-*
          merge-multiple: true
          path: visual-hive-artifacts

      - name: Summarize Hive handoff packet
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          ARTIFACT_ROOT: visual-hive-artifacts
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const root = process.env.ARTIFACT_ROOT;
            const redactSecretValues = (value) => String(value || "")
              .replace(/\bauthorization\b\s*[:=]\s*(?:bearer\s+)?[^\r\n&"']+/gi, "authorization=[REDACTED]")
              .replace(/\b(client_secret|set-cookie|cookie|token|password|secret|key|code)\b\s*[:=]\s*[^&\s"']+/gi, "$1=[REDACTED]")
              .replace(/\bbearer\s+[A-Za-z0-9._~+/=-]+/gi, "bearer [REDACTED]");
            function walk(dir) {
              if (!fs.existsSync(dir)) return [];
              return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
                const full = path.join(dir, entry.name);
                return entry.isDirectory() ? walk(full) : [full];
              });
            }
            const files = walk(root);
            const summary = {
              schemaVersion: "visual-hive.hive-handoff-workflow-summary.v1",
              generatedAt: new Date().toISOString(),
              sourceWorkflow: context.payload.workflow_run?.name,
              sourceConclusion: context.payload.workflow_run?.conclusion,
              checkoutPerformed: false,
              repoCodeExecuted: false,
              repairBranchesCreated: 0,
              pullRequestsOpened: 0,
              hiveApiCallsMade: 0,
              externalCallsMade: 0,
              expectedHiveQueue: "GitHub issues labeled visual-hive/ready-for-hive and hive/quality",
              artifacts: {
                issues: files.find((file) => file.endsWith("issues.json")),
                queue: files.find((file) => file.endsWith("issue-queue.json")),
                hiveExport: files.find((file) => file.endsWith("hive-export.json")),
                beads: files.find((file) => file.endsWith("beads.json")),
                workOrders: files.find((file) => file.endsWith("repair-work-orders.json")) || files.find((file) => file.endsWith("hive-agent-work-orders.json"))
              }
            };
            fs.mkdirSync("visual-hive-handoff-summary", { recursive: true });
            fs.writeFileSync("visual-hive-handoff-summary/hive-handoff-summary.json", `${redactSecretValues(JSON.stringify(summary, null, 2))}\n`);
            await core.summary
              .addHeading("Visual Hive Hive Handoff")
              .addRaw("Visual Hive does not create repair branches or PRs. Hive should consume issues labeled `visual-hive/ready-for-hive` and the exported bead/work-order artifacts.")
              .addTable([
                [{ data: "Metric", header: true }, { data: "Value", header: true }],
                ["Hive API calls", "0"],
                ["Repair branches created", "0"],
                ["Pull requests opened", "0"],
                ["Expected Hive queue", summary.expectedHiveQueue]
              ])
              .write();

      - name: Upload Hive handoff summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-hive-hive-handoff-summary
          path: visual-hive-handoff-summary
          if-no-files-found: error
          include-hidden-files: true
