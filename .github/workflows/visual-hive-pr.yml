name: Visual Hive PR

on:
  pull_request:
  # Base-branch-only uninstall publication. No proposed checkout, dependency,
  # test, or Visual Hive process is ever executed by this event.
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions: {}

concurrency:
  group: visual-hive-pr-${{ github.event_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  setup-authorization:
    name: Hive setup authorization
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'pull_request_target' && github.event.pull_request.head.ref == 'hive/uninstall-1287566668' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.base.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      pull-requests: read
      statuses: read
    outputs:
      authorized: ${{ steps.authorize.outputs.authorized }}
      context: ${{ steps.authorize.outputs.context }}
      binding_digest: ${{ steps.authorize.outputs.binding_digest }}
      diff_digest: ${{ steps.authorize.outputs.diff_digest }}
      operation: ${{ steps.authorize.outputs.operation }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          # The authorization lane reads proposed Git objects but never checks
          # out the proposed tree, including under pull_request_target.
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.23.1
      - name: Verify out-of-band exact setup authorization
        id: authorize
        shell: bash
        env:
          HIVE_STATUS_TOKEN: ${{ github.token }}
          HIVE_API_URL: ${{ github.api_url }}
          HIVE_REPOSITORY: ${{ github.repository }}
          HIVE_REPOSITORY_ID: ${{ github.event.repository.id }}
          HIVE_PULL_REQUEST: ${{ github.event.pull_request.number }}
          HIVE_PULL_REQUEST_URL: ${{ github.event.pull_request.html_url }}
          HIVE_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          HIVE_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HIVE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HIVE_BASE_REPOSITORY: ${{ github.event.pull_request.base.repo.full_name }}
          HIVE_BASE_REF: ${{ github.event.pull_request.base.ref }}
          HIVE_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HIVE_EXPECTED_HEAD_REF: hive/setup-1287566668
          HIVE_EXPECTED_UPGRADE_REF: hive/upgrade-1287566668
          HIVE_EXPECTED_ROLLBACK_REF: hive/rollback-1287566668
          HIVE_EXPECTED_AUTHORIZER_TRANSFER_REF: hive/authorizer-transfer-1287566668
          HIVE_EXPECTED_UNINSTALL_REF: hive/uninstall-1287566668
          HIVE_EXPECTED_BASE_REF: main
          HIVE_AUTHORIZER_ID: "183157248"
          HIVE_TRANSFER_AUTHORIZER_ID: "183157248"
          HIVE_REQUIRED_FILES: '[".hive/integrated.json",".github/workflows/hive-visual-hive.yml","docs/hive-quickstart.md",".github/workflows/visual-hive-pr.yml","docs/visual-hive.md","visual-hive.config.yaml"]'
          HIVE_REQUIRED_ABSENT: '[".github/workflows/visual-hive-lifecycle.yml",".github/workflows/visual-hive-issue-lifecycle.yml",".github/workflows/visual-hive-trusted-publisher.yml",".github/workflows/visual-hive-failure-issue.yml",".github/workflows/visual-hive-hive-handoff.yml"]'
          HIVE_ALLOWED_FILES: '[".hive/integrated.json",".github/workflows/hive-visual-hive.yml","docs/hive-quickstart.md","docs/visual-hive.md","visual-hive.config.yaml",".github/workflows/visual-hive-pr.yml",".github/workflows/visual-hive-lifecycle.yml",".github/workflows/visual-hive-issue-lifecycle.yml",".github/workflows/visual-hive-trusted-publisher.yml",".github/workflows/visual-hive-failure-issue.yml",".github/workflows/visual-hive-hive-handoff.yml"]'
          HIVE_UNINSTALL_REQUIRED_FILES: '[".hive/integrated.json",".github/workflows/hive-visual-hive.yml","docs/hive-quickstart.md","docs/visual-hive.md","visual-hive.config.yaml",".github/workflows/visual-hive-pr.yml",".github/workflows/visual-hive-hive-handoff.yml"]'
          HIVE_UNINSTALL_REQUIRED_ABSENT: '[".github/workflows/visual-hive-lifecycle.yml",".github/workflows/visual-hive-issue-lifecycle.yml",".github/workflows/visual-hive-trusted-publisher.yml",".github/workflows/visual-hive-failure-issue.yml"]'
          HIVE_UNINSTALL_ALLOWED_FILES: '[".hive/integrated.json",".github/workflows/hive-visual-hive.yml","docs/hive-quickstart.md","docs/visual-hive.md","visual-hive.config.yaml",".github/workflows/visual-hive-pr.yml",".github/workflows/visual-hive-lifecycle.yml",".github/workflows/visual-hive-issue-lifecycle.yml",".github/workflows/visual-hive-trusted-publisher.yml",".github/workflows/visual-hive-failure-issue.yml",".github/workflows/visual-hive-hive-handoff.yml"]'
        run: |
          set -euo pipefail
          case "$HIVE_HEAD_REF" in
            "$HIVE_EXPECTED_HEAD_REF"|"$HIVE_EXPECTED_UPGRADE_REF"|"$HIVE_EXPECTED_ROLLBACK_REF"|"$HIVE_EXPECTED_AUTHORIZER_TRANSFER_REF"|"$HIVE_EXPECTED_UNINSTALL_REF")
              authorization_header="$(printf 'x-access-token:%s' "$HIVE_STATUS_TOKEN" | base64 | tr -d '\r\n')"
              git -c protocol.file.allow=never -c "http.extraheader=AUTHORIZATION: basic $authorization_header" fetch --force --no-tags --no-recurse-submodules origin "refs/heads/$HIVE_HEAD_REF:refs/remotes/origin/hive-authorization-head"
              unset authorization_header
              ;;
          esac
          node <<'NODE'
          const child = require("child_process");
          const crypto = require("crypto");
          const fs = require("fs");

          const domain = "hive.setup-diff-tree-blobs.v1";
          const schema = "hive.setup-pr-authorization.v1";
          const diffAlgorithm = "hive.setup-diff-tree-blobs.v1+sha256";
          const contextPrefix = "hive/setup-authorized/";
          const sha40 = /^[a-f0-9]{40}$/u;
          const digest64 = /^[a-f0-9]{64}$/u;
          const oidPattern = /^[a-f0-9]{40}(?:[a-f0-9]{24})?$/u;
          const baselinePattern = /^\.visual-hive\/snapshots\/(?:[^/]+\/)*[^/]+\.png$/u;
          let required = JSON.parse(process.env.HIVE_REQUIRED_FILES || "[]").sort();
          let absent = JSON.parse(process.env.HIVE_REQUIRED_ABSENT || "[]").sort();
          let allowed = new Set(JSON.parse(process.env.HIVE_ALLOWED_FILES || "[]"));

          function output(authorized, context, bindingDigest, diffDigest, operation) {
            const rows = [
              "authorized=" + (authorized ? "true" : "false"),
              "context=" + (context || ""),
              "binding_digest=" + (bindingDigest || ""),
              "diff_digest=" + (diffDigest || ""),
              "operation=" + (operation || "")
            ];
            fs.appendFileSync(process.env.GITHUB_OUTPUT, rows.join("\n") + "\n");
          }

          function git(args) {
            const result = child.spawnSync("git", args, {
              encoding: null,
              maxBuffer: 256 * 1024 * 1024,
              env: { ...process.env, LC_ALL: "C", LANG: "C", GIT_CONFIG_NOSYSTEM: "1", GIT_ATTR_NOSYSTEM: "1", GIT_NO_REPLACE_OBJECTS: "1" }
            });
            if (result.status !== 0) throw new Error("git " + args.join(" ") + " failed");
            return Buffer.from(result.stdout || []);
          }

          function u64(value) {
            const result = Buffer.alloc(8);
            result.writeBigUInt64BE(BigInt(value));
            return result;
          }

          function put(hasher, value) {
            const data = Buffer.isBuffer(value) ? value : Buffer.from(String(value), "utf8");
            hasher.update(u64(data.length));
            hasher.update(data);
          }

          function readNul(raw, state) {
            const end = raw.indexOf(0, state.offset);
            if (end < 0) throw new Error("canonical diff ended inside a NUL record");
            const value = raw.subarray(state.offset, end);
            state.offset = end + 1;
            return value;
          }

          function parseDiff(raw) {
            const state = { offset: 0 };
            const records = [];
            while (state.offset < raw.length) {
              const header = readNul(raw, state).toString("ascii").trim().split(/\s+/u);
              const filePath = readNul(raw, state);
              if (header.length !== 5 || !header[0].startsWith(":") || header[0].length !== 7 || header[1].length !== 6 || !/^[ADMTUX]$/u.test(header[4])) throw new Error("malformed canonical diff-tree record");
              const oldOID = header[2];
              const newOID = header[3];
              if (!oidPattern.test(oldOID) || !oidPattern.test(newOID)) throw new Error("malformed canonical object ID");
              const pathText = filePath.toString("utf8");
              if (!pathText || Buffer.from(pathText, "utf8").compare(filePath) !== 0 || pathText.includes("\\") || pathText.includes("\0") || pathText.startsWith("/") || pathText.split("/").some((part) => !part || part === "." || part === "..")) throw new Error("unsafe canonical diff path");
              records.push({ status: header[4], oldMode: header[0].slice(1), newMode: header[1], oldOID, newOID, path: filePath, pathText });
            }
            records.sort((left, right) => Buffer.compare(left.path, right.path));
            for (let index = 1; index < records.length; index++) if (Buffer.compare(records[index - 1].path, records[index].path) === 0) throw new Error("duplicate canonical diff path");
            return records;
          }

          function hashObject(hasher, mode, oid) {
            if (mode === "000000" || /^0+$/u.test(oid)) {
              put(hasher, "missing");
              hasher.update(u64(0));
              return;
            }
            if (mode === "160000") {
              put(hasher, "gitlink");
              hasher.update(u64(0));
              return;
            }
            if (!["100644", "100755", "120000"].includes(mode)) throw new Error("unsupported Git mode " + mode);
            if (git(["cat-file", "-t", oid]).toString("utf8").trim() !== "blob") throw new Error("canonical object is not a blob");
            const data = git(["cat-file", "blob", oid]);
            const declared = Number(git(["cat-file", "-s", oid]).toString("utf8").trim());
            if (!Number.isSafeInteger(declared) || declared !== data.length) throw new Error("canonical blob size mismatch");
            put(hasher, "blob");
            hasher.update(u64(data.length));
            hasher.update(data);
          }

          function diffEvidence(baseSHA, headSHA) {
            git(["cat-file", "-e", baseSHA + "^{commit}"]);
            git(["cat-file", "-e", headSHA + "^{commit}"]);
            const records = parseDiff(git(["diff-tree", "--no-commit-id", "--raw", "-r", "-z", "--no-renames", baseSHA, headSHA, "--"]));
            if (records.length === 0) throw new Error("setup authorization refuses an empty diff");
            const hasher = crypto.createHash("sha256");
            put(hasher, domain);
            hasher.update(u64(records.length));
            for (const record of records) {
              for (const value of [record.status, record.oldMode, record.newMode, record.oldOID, record.newOID, record.path]) put(hasher, value);
              hashObject(hasher, record.oldMode, record.oldOID);
              hashObject(hasher, record.newMode, record.newOID);
            }
            return { digest: hasher.digest("hex"), records };
          }

          function treeEntry(headSHA, filePath) {
            const raw = git(["ls-tree", "-z", headSHA, "--", ":(literal)" + filePath]);
            if (raw.length === 0) return null;
            if (raw[raw.length - 1] !== 0 || raw.subarray(0, raw.length - 1).includes(0)) throw new Error("ambiguous required setup path " + filePath);
            const row = raw.subarray(0, raw.length - 1);
            const tab = row.indexOf(9);
            if (tab < 0 || row.subarray(tab + 1).toString("utf8") !== filePath) throw new Error("inexact required setup path " + filePath);
            const metadata = row.subarray(0, tab).toString("ascii").trim().split(/\s+/u);
            if (metadata.length !== 3 || !oidPattern.test(metadata[2])) throw new Error("malformed required setup tree entry");
            return { mode: metadata[0], type: metadata[1], oid: metadata[2] };
          }

          function requiredFiles(headSHA) {
            const files = [];
            for (const filePath of required) {
              const entry = treeEntry(headSHA, filePath);
              if (!entry || entry.mode !== "100644" || entry.type !== "blob") throw new Error("required setup file missing or not regular: " + filePath);
              const data = git(["cat-file", "blob", entry.oid]);
              const declared = Number(git(["cat-file", "-s", entry.oid]).toString("utf8").trim());
              if (!Number.isSafeInteger(declared) || declared !== data.length) throw new Error("required setup blob size mismatch");
              files.push({ path: filePath, mode: entry.mode, blob_oid: entry.oid, size: data.length, content_sha256: crypto.createHash("sha256").update(data).digest("hex") });
            }
            for (const filePath of absent) if (treeEntry(headSHA, filePath)) throw new Error("required absent managed path is present: " + filePath);
            return files;
          }

          async function latestStatus(repository, headSHA, expectedContext) {
            for (let page = 1; page <= 10; page++) {
              const response = await fetch(process.env.HIVE_API_URL + "/repos/" + repository + "/commits/" + headSHA + "/statuses?per_page=100&page=" + page, {
                headers: { "Accept": "application/vnd.github+json", "Authorization": "Bearer " + process.env.HIVE_STATUS_TOKEN, "X-GitHub-Api-Version": "2022-11-28" }
              });
              if (!response.ok) throw new Error("status lookup returned HTTP " + response.status);
              const statuses = await response.json();
              if (!Array.isArray(statuses)) throw new Error("status lookup returned a non-array");
              const matched = statuses.find((status) => String(status.context || "").toLowerCase() === expectedContext);
              if (matched) return matched;
              if (statuses.length < 100) return null;
            }
            throw new Error("status lookup exceeded its bounded page limit");
          }

          async function main() {
            let context = "";
            let bindingDigest = "";
            let diffDigest = "";
            let operation = "";
            try {
              const repository = String(process.env.HIVE_REPOSITORY || "").toLowerCase();
              const repositoryID = String(process.env.HIVE_REPOSITORY_ID || "");
              const pullRequest = Number(process.env.HIVE_PULL_REQUEST || "0");
              let authorizerID = String(process.env.HIVE_AUTHORIZER_ID || "");
              const transferAuthorizerID = String(process.env.HIVE_TRANSFER_AUTHORIZER_ID || "");
              const headSHA = String(process.env.HIVE_HEAD_SHA || "").toLowerCase();
              const baseSHA = String(process.env.HIVE_BASE_SHA || "").toLowerCase();
              const headRef = String(process.env.HIVE_HEAD_REF || "");
              const baseRef = String(process.env.HIVE_BASE_REF || "");
              if (!sha40.test(headSHA) || !sha40.test(baseSHA) || !/^[1-9][0-9]*$/u.test(repositoryID) || !/^[1-9][0-9]*$/u.test(authorizerID) || !/^[1-9][0-9]*$/u.test(transferAuthorizerID) || !Number.isSafeInteger(pullRequest) || pullRequest <= 0) throw new Error("invalid immutable setup event identity");
              if (baseRef !== process.env.HIVE_EXPECTED_BASE_REF || String(process.env.HIVE_HEAD_REPOSITORY || "").toLowerCase() !== repository || String(process.env.HIVE_BASE_REPOSITORY || "").toLowerCase() !== repository) throw new Error("pull request is not the expected same-repository managed operation");
              if (headRef === process.env.HIVE_EXPECTED_UNINSTALL_REF) {
                operation = "uninstall";
                required = JSON.parse(process.env.HIVE_UNINSTALL_REQUIRED_FILES || "[]").sort();
                absent = JSON.parse(process.env.HIVE_UNINSTALL_REQUIRED_ABSENT || "[]").sort();
                allowed = new Set(JSON.parse(process.env.HIVE_UNINSTALL_ALLOWED_FILES || "[]"));
              } else if (headRef === process.env.HIVE_EXPECTED_UPGRADE_REF) {
                operation = "upgrade";
              } else if (headRef === process.env.HIVE_EXPECTED_ROLLBACK_REF) {
                operation = "rollback";
              } else if (headRef === process.env.HIVE_EXPECTED_AUTHORIZER_TRANSFER_REF) {
                operation = "authorizer-transfer";
                authorizerID = transferAuthorizerID;
              } else if (headRef === process.env.HIVE_EXPECTED_HEAD_REF) {
                operation = "setup";
              } else {
                throw new Error("pull request is not the expected same-repository managed operation");
              }
              const diff = diffEvidence(baseSHA, headSHA);
              diffDigest = diff.digest;
              for (const record of diff.records) if (!allowed.has(record.pathText) && !(operation !== "uninstall" && baselinePattern.test(record.pathText))) throw new Error("unmanaged setup path " + record.pathText);
              const files = requiredFiles(headSHA);
              const binding = {
                schema_version: schema,
                repository,
                repository_id: repositoryID,
                pull_request: pullRequest,
                head_ref: headRef,
                head_sha: headSHA,
                base_ref: baseRef,
                base_sha: baseSHA,
                authorizer_id: authorizerID,
                diff_algorithm: diffAlgorithm,
                diff_sha256: diffDigest,
                required_files: files,
                required_absent: absent
              };
              bindingDigest = crypto.createHash("sha256").update(JSON.stringify(binding)).digest("hex");
              if (!digest64.test(bindingDigest)) throw new Error("invalid setup binding digest");
              context = contextPrefix + bindingDigest;
              const pollAttempts = Math.min(20, Math.max(1, Number(process.env.HIVE_SETUP_STATUS_POLL_ATTEMPTS || "8")));
              const pollDelay = Math.min(30000, Math.max(0, Number(process.env.HIVE_SETUP_STATUS_POLL_DELAY_MS || "5000")));
              let status = null;
              for (let attempt = 0; attempt < pollAttempts && !status; attempt++) {
                status = await latestStatus(repository, headSHA, context);
                if (!status && attempt + 1 < pollAttempts) await new Promise((resolve) => setTimeout(resolve, pollDelay));
              }
              const creator = status && status.creator;
              const exact = status && String(status.state || "").toLowerCase() === "success" && String(status.context || "").toLowerCase() === context &&
                creator && String(creator.id || "") === authorizerID && String(creator.type || "").toLowerCase() === "user" &&
                String(status.target_url || "") === String(process.env.HIVE_PULL_REQUEST_URL || "");
              if (!exact) throw new Error("latest exact-head setup status was absent or did not match creator/target/state");
              output(true, context, bindingDigest, diffDigest, operation);
            } catch (error) {
              console.log("Setup authorization not present: " + String(error && error.message ? error.message : error));
              output(false, context, bindingDigest, diffDigest, operation);
            }
          }

          main().catch((error) => {
            console.log("Setup authorization verifier failed closed: " + String(error));
            output(false, "", "", "", "");
          });
          NODE

  uninstall-required-check:
    name: Publish exact Hive uninstall check
    needs: setup-authorization
    if: ${{ always() && github.event_name == 'pull_request_target' && needs.setup-authorization.outputs.operation == 'uninstall' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      checks: write
    steps:
      - name: Publish exact authorized uninstall check
        shell: bash
        env:
          HIVE_CHECK_TOKEN: ${{ github.token }}
          HIVE_API_URL: ${{ github.api_url }}
          HIVE_REPOSITORY: ${{ github.repository }}
          HIVE_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HIVE_PULL_REQUEST_URL: ${{ github.event.pull_request.html_url }}
          HIVE_SETUP_AUTHORIZED: ${{ needs.setup-authorization.outputs.authorized }}
          HIVE_SETUP_BINDING_DIGEST: ${{ needs.setup-authorization.outputs.binding_digest }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const digest = String(process.env.HIVE_SETUP_BINDING_DIGEST || "").toLowerCase();
          const head = String(process.env.HIVE_HEAD_SHA || "").toLowerCase();
          const repository = String(process.env.HIVE_REPOSITORY || "");
          const details = String(process.env.HIVE_PULL_REQUEST_URL || "");
          if (process.env.HIVE_SETUP_AUTHORIZED !== "true" || !/^[a-f0-9]{64}$/u.test(digest) || !/^[a-f0-9]{40}$/u.test(head) || !/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/u.test(repository) || !details) {
            throw new Error("exact out-of-band uninstall authorization is absent");
          }
          const external = "hive-uninstall-" + digest;
          const headers = {
            "Accept": "application/vnd.github+json",
            "Authorization": "Bearer " + process.env.HIVE_CHECK_TOKEN,
            "Content-Type": "application/json",
            "X-GitHub-Api-Version": "2022-11-28"
          };
          async function request(url, init = {}) {
            const response = await fetch(url, { ...init, headers: { ...headers, ...(init.headers || {}) } });
            const text = await response.text();
            if (!response.ok) throw new Error("GitHub Checks API returned HTTP " + response.status + ": " + text.slice(0, 300));
            return text ? JSON.parse(text) : {};
          }
          async function exactExisting() {
            const matched = [];
            for (let page = 1; page <= 10; page++) {
              const value = await request(process.env.HIVE_API_URL + "/repos/" + repository + "/commits/" + head + "/check-runs?check_name=visual-hive&filter=all&per_page=100&page=" + page);
              const runs = Array.isArray(value.check_runs) ? value.check_runs : [];
              for (const run of runs) {
                if (String(run.external_id || "") === external && String(run.head_sha || "").toLowerCase() === head && run.app && String(run.app.slug || "").toLowerCase() === "github-actions") matched.push(run);
              }
              if (runs.length < 100) break;
              if (page === 10) throw new Error("exact uninstall check discovery exceeded its bounded page limit");
            }
            if (matched.length > 1) throw new Error("multiple exact uninstall checks claim one authorization binding");
            return matched[0] || null;
          }
          async function main() {
            let check = await exactExisting();
            if (!check) {
              check = await request(process.env.HIVE_API_URL + "/repos/" + repository + "/check-runs", {
                method: "POST",
                body: JSON.stringify({
                  name: "visual-hive",
                  head_sha: head,
                  status: "completed",
                  conclusion: "success",
                  details_url: details,
                  external_id: external,
                  output: { title: "Exact Hive uninstall authorized", summary: "Hive verified the immutable cleanup diff out of band. No pull-request code or workflow from the proposed head was executed." }
                })
              });
            }
            const exact = Number(check.id) > 0 && check.name === "visual-hive" && String(check.head_sha || "").toLowerCase() === head &&
              check.status === "completed" && check.conclusion === "success" && check.details_url === details && check.external_id === external &&
              check.app && String(check.app.slug || "").toLowerCase() === "github-actions";
            if (!exact) throw new Error("created or recovered uninstall check did not match the exact immutable authorization");
            console.log("Published exact authorized uninstall check " + check.id + " for " + head);
          }
          main().catch((error) => { console.error(String(error)); process.exitCode = 1; });
          NODE

  repository-test-001:
    name: Hive repository test 001
    needs: setup-authorization
    if: ${{ github.event_name == 'pull_request' && needs.setup-authorization.outputs.operation != 'uninstall' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - &hive-repository-test-checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false
      - &hive-repository-test-setup-node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.23.1
      - &hive-repository-test-setup-python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - &hive-repository-test-prepare-account
        name: Prepare isolated target account
        shell: bash
        run: |
          set -euo pipefail
          for reserved_account in hive-target hive-evidence; do
            if id -u "$reserved_account" >/dev/null 2>&1; then
              echo "Reserved isolation account already exists: $reserved_account" >&2
              exit 1
            fi
          done
          sudo useradd --create-home --shell /bin/bash hive-target
          sudo useradd --create-home --shell /usr/sbin/nologin hive-evidence
          sudo install -d -o hive-target -g hive-target -m 0755 /home/hive-target/.local/bin /home/hive-target/.cache
          sudo install -d -o hive-evidence -g hive-evidence -m 0700 /home/hive-evidence/.cache /home/hive-evidence/.cache/tmp
          sudo chmod 0700 /home/hive-evidence
          python_bin="$(command -v python)"
          (cd / && sudo -u hive-target -- env -i HOME=/home/hive-target PATH="$PATH" "$python_bin" -I -m venv /home/hive-target/.venv)
          target_root="/opt/hive-target"
          target_workspace="/opt/hive-target/workspace"
          trusted_root="/opt/hive-target/trusted"
          test ! -e "$target_root"
          sudo install -d -o root -g root -m 0755 "$target_root" "$target_workspace" "$trusted_root"
          test -d "$GITHUB_WORKSPACE"
          test ! -L "$GITHUB_WORKSPACE"
          test "$(readlink -f "$GITHUB_WORKSPACE")" = "$GITHUB_WORKSPACE"
          sudo chown -R hive-target:hive-target "$GITHUB_WORKSPACE"
          test -d .git
          test ! -L .git
          test -f visual-hive.config.yaml
          test ! -L visual-hive.config.yaml
          sudo chown -R root:root .git
          sudo chmod -R a-w .git
          sudo chown root:root visual-hive.config.yaml
          sudo chmod 0444 visual-hive.config.yaml
          sudo chmod 1777 "$GITHUB_WORKSPACE"
          sudo mount --bind "$GITHUB_WORKSPACE" "$target_workspace"
          mountpoint -q "$target_workspace"
          test "$(stat -Lc '%d:%i' "$target_workspace")" = "$(stat -Lc '%d:%i' "$GITHUB_WORKSPACE")"
          echo "HIVE_TARGET_WORKSPACE=$target_workspace" >> "$GITHUB_ENV"
      - &hive-repository-test-provision-tools
        name: Provision trusted repository test tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends ripgrep
          rg_path="$(readlink -f /usr/bin/rg)"
          test "$rg_path" = "/usr/bin/rg"
          test -x "$rg_path"
          test "$(dpkg-query -S "$rg_path")" = "ripgrep: /usr/bin/rg"
          test "$(stat -Lc '%u:%g' "$rg_path")" = "0:0"
          if sudo -u hive-target -- test -w "$rg_path"; then
            echo "System ripgrep executable is writable by the isolated target account" >&2
            exit 1
          fi
          rg_version="$($rg_path --version | sed -n '1p')"
          case "$rg_version" in
            'ripgrep '[0-9]*) ;;
            *) echo "System ripgrep reported an invalid version: $rg_version" >&2; exit 1 ;;
          esac
          target_rg="$(sudo -u hive-target -- env -i -C "$HIVE_TARGET_WORKSPACE" HOME=/home/hive-target PATH="/home/hive-target/.local/bin:/home/hive-target/.venv/bin:$PATH" LANG=C.UTF-8 CI=true PLAYWRIGHT_BROWSERS_PATH=/home/hive-target/.cache/ms-playwright HIVE_TARGET_WORKSPACE="$HIVE_TARGET_WORKSPACE" HIVE_TARGET_PROCESS=1 bash --noprofile --norc -c 'command -v rg')"
          test "$(readlink -f "$target_rg")" = "$rg_path"
          probe_output="$(sudo -u hive-target -- env -i -C "$HIVE_TARGET_WORKSPACE" HOME=/home/hive-target PATH="/home/hive-target/.local/bin:/home/hive-target/.venv/bin:$PATH" LANG=C.UTF-8 CI=true PLAYWRIGHT_BROWSERS_PATH=/home/hive-target/.cache/ms-playwright HIVE_TARGET_WORKSPACE="$HIVE_TARGET_WORKSPACE" HIVE_TARGET_PROCESS=1 bash --noprofile --norc -c '
          set -euo pipefail
          probe_root="$HOME/.cache/tmp/hive-rg-package-manager-probe"
          rm -rf -- "$probe_root"
          mkdir -p "$probe_root"
          printf "%s\n" "{\"scripts\":{\"hive-rg-probe\":\"command -v rg && rg --version\"}}" > "$probe_root/package.json"
          npm --prefix "$probe_root" run --silent hive-rg-probe
          rm -rf -- "$probe_root"
          ')"
          test "$(printf '%s\n' "$probe_output" | sed -n '1p')" = "$rg_path"
          if ! printf '%s\n' "$probe_output" | grep -Fqx "$rg_version"; then
            echo "Ordinary target npm execution did not report the provisioned system ripgrep version" >&2
            exit 1
          fi
      - &hive-repository-test-install-dependencies
        name: Install repository test dependencies
        shell: bash
        run: |
          set -euo pipefail

          sudo -u hive-target -- env -i -C "$HIVE_TARGET_WORKSPACE" HOME=/home/hive-target PATH="/home/hive-target/.local/bin:/home/hive-target/.venv/bin:$PATH" LANG=C.UTF-8 CI=true PLAYWRIGHT_BROWSERS_PATH=/home/hive-target/.cache/ms-playwright HIVE_TARGET_WORKSPACE="$HIVE_TARGET_WORKSPACE" HIVE_TARGET_PROCESS=1 bash --noprofile --norc -euo pipefail <<'HIVE_TARGET_DEPENDENCIES'
          test -n "${HIVE_TARGET_WORKSPACE:-}"
          test "$(pwd -P)" = "$HIVE_TARGET_WORKSPACE"
          corepack_enabled=0
          enable_corepack() {
            if [ "$corepack_enabled" -eq 0 ]; then
              corepack enable --install-directory /home/hive-target/.local/bin
              corepack_enabled=1
            fi
          }
          validate_package_scope() {
            local lockfile="$1"
            local package_dir
            package_dir="$(dirname "$lockfile")"
            if [ -f "$package_dir/package.json" ]; then
              return 0
            fi
            if [ "$(basename "$lockfile")" != "package-lock.json" ]; then
              echo "Package lock $lockfile has no sibling package.json" >&2
              return 1
            fi
            if ! node - "$lockfile" <<'NODE'
          const fs = require("fs");
          const lockfile = process.argv[2];
          const isObject = (value) => value !== null && typeof value === "object" && !Array.isArray(value);
          let lock;
          try {
            lock = JSON.parse(fs.readFileSync(lockfile, "utf8"));
          } catch (_) {
            process.exit(1);
          }
          if (!isObject(lock) || !isObject(lock.packages) || Object.keys(lock.packages).length !== 0) {
            process.exit(1);
          }
          if (Object.prototype.hasOwnProperty.call(lock, "dependencies") &&
              (!isObject(lock.dependencies) || Object.keys(lock.dependencies).length !== 0)) {
            process.exit(1);
          }
          NODE
            then
              echo "Orphan npm lock $lockfile is not provably inert; add its package.json or remove the stale lock" >&2
              return 1
            fi
            echo "Ignoring provably inert orphan npm lock $lockfile (no sibling package.json)"
          }
          while IFS= read -r -d '' lockfile; do
            package_dir="$(dirname "$lockfile")"
            lock_count=0
            [ -f "$package_dir/package-lock.json" ] && lock_count=$((lock_count + 1))
            [ -f "$package_dir/pnpm-lock.yaml" ] && lock_count=$((lock_count + 1))
            [ -f "$package_dir/yarn.lock" ] && lock_count=$((lock_count + 1))
            if [ "$lock_count" -ne 1 ]; then
              echo "Package scope $package_dir must contain exactly one supported lockfile" >&2
              exit 1
            fi
            validate_package_scope "$lockfile"
          done < <(find . \( -name package-lock.json -o -name pnpm-lock.yaml -o -name yarn.lock \) -not -path '*/node_modules/*' -not -path './.git/*' -print0 | sort -z)
          while IFS= read -r -d '' lockfile; do
            package_dir="$(dirname "$lockfile")"
            if [ ! -f "$package_dir/package.json" ]; then
              validate_package_scope "$lockfile"
              continue
            fi
            test -f "$package_dir/package-lock.json"
            (cd "$package_dir" && npm ci)
          done < <(find . -name package-lock.json -not -path '*/node_modules/*' -not -path './.git/*' -print0 | sort -z)
          while IFS= read -r -d '' lockfile; do
            enable_corepack
            package_dir="$(dirname "$lockfile")"
            (cd "$package_dir" && pnpm install --frozen-lockfile)
          done < <(find . -name pnpm-lock.yaml -not -path '*/node_modules/*' -not -path './.git/*' -print0 | sort -z)
          while IFS= read -r -d '' lockfile; do
            enable_corepack
            package_dir="$(dirname "$lockfile")"
            yarn_version="$(cd "$package_dir" && yarn --version)"
            yarn_major="${yarn_version%%.*}"
            if ! [[ "$yarn_major" =~ ^[0-9]+$ ]]; then
              echo "Could not determine Yarn major version for $package_dir" >&2
              exit 1
            fi
            if [ "$yarn_major" -ge 2 ]; then
              (cd "$package_dir" && yarn install --immutable)
            else
              (cd "$package_dir" && yarn install --frozen-lockfile)
            fi
          done < <(find . -name yarn.lock -not -path '*/node_modules/*' -not -path './.git/*' -print0 | sort -z)
          has_ancestor_package_lock() {
            local candidate="$1"
            node - "$candidate" <<'NODE'
          const fs = require("fs");
          const path = require("path");
          const root = fs.realpathSync(process.cwd());
          const target = fs.realpathSync(process.argv[2]);
          const locks = ["package-lock.json", "pnpm-lock.yaml", "yarn.lock"];

          function patternsFor(scope) {
            const patterns = [];
            try {
              const manifest = JSON.parse(fs.readFileSync(path.join(scope, "package.json"), "utf8"));
              if (Array.isArray(manifest.workspaces)) patterns.push(...manifest.workspaces);
              if (manifest.workspaces && Array.isArray(manifest.workspaces.packages)) patterns.push(...manifest.workspaces.packages);
            } catch (_) {}
            try {
              const lines = fs.readFileSync(path.join(scope, "pnpm-workspace.yaml"), "utf8").split(/\r?\n/);
              let inPackages = false;
              for (const line of lines) {
                const inline = line.match(/^\s*packages\s*:\s*\[(.*)\]\s*$/);
                if (inline) {
                  for (const value of inline[1].split(",")) patterns.push(value.trim().replace(/^['"]|['"]$/g, ""));
                  inPackages = false;
                  continue;
                }
                if (/^\s*packages\s*:\s*$/.test(line)) {
                  inPackages = true;
                  continue;
                }
                if (inPackages && /^\S/.test(line)) inPackages = false;
                if (inPackages) {
                  const item = line.match(/^\s*-\s*(['"]?)(.*?)\1\s*(?:#.*)?$/);
                  if (item && item[2]) patterns.push(item[2]);
                }
              }
            } catch (_) {}
            return patterns;
          }

          function globExpression(pattern) {
            pattern = pattern.split(String.fromCharCode(92)).join("/").replace(/^\.\//, "").replace(/^\/+|\/+$/g, "");
            let source = "^";
            for (let index = 0; index < pattern.length; index += 1) {
              const character = pattern[index];
              if (character === "*") {
                if (pattern[index + 1] === "*") {
                  index += 1;
                  if (pattern[index + 1] === "/") {
                    index += 1;
                    source += "(?:.*/)?";
                  } else {
                    source += ".*";
                  }
                } else {
                  source += "[^/]*";
                }
              } else if (character === "?") {
                source += "[^/]";
              } else {
                if (".+()|[]{}^$".includes(character)) source += "\\";
                source += character;
              }
            }
            return new RegExp(source + "$");
          }

          function owns(scope) {
            const relative = path.relative(scope, target).split(path.sep).join("/");
            let matched = false;
            for (let pattern of patternsFor(scope)) {
              pattern = String(pattern).trim().split(String.fromCharCode(92)).join("/");
              const excluded = pattern.startsWith("!");
              if (excluded) pattern = pattern.slice(1);
              if (pattern && globExpression(pattern).test(relative)) matched = !excluded;
            }
            return matched;
          }

          function insideRoot(value) {
            const relative = path.relative(root, value);
            return relative === "" || (relative !== ".." && !relative.startsWith(".." + path.sep));
          }

          let scope = target;
          while (insideRoot(scope)) {
            const hasLock = locks.some((name) => fs.existsSync(path.join(scope, name)));
            if (hasLock && (scope === target || owns(scope))) process.exit(0);
            if (scope === root) break;
            const parent = path.dirname(scope);
            if (parent === scope) break;
            scope = parent;
          }
          process.exit(1);
          NODE
          }
          lockless_package_dirs=()
          while IFS= read -r -d '' manifest; do
            package_dir="$(dirname "$manifest")"
            if has_ancestor_package_lock "$package_dir"; then
              continue
            fi
            lockless_package_dirs+=("$package_dir")
          done < <(find . -name package.json -not -path '*/node_modules/*' -not -path './.git/*' -not -path '*/dist/*' -not -path '*/build/*' -not -path '*/coverage/*' -not -path '*/vendor/*' -not -path './.visual-hive/*' -print0 | sort -z)
          for package_dir in "${lockless_package_dirs[@]}"; do
            (cd "$package_dir" && npm install)
          done
          install_python_scope() {
            local scope="$1"
            local pyproject
            local requirements
            if [ "$scope" = "." ]; then
              pyproject="pyproject.toml"
              requirements="requirements.txt"
            else
              pyproject="$scope/pyproject.toml"
              requirements="$scope/requirements.txt"
            fi
            if [ -f "$pyproject" ]; then
              python -m pip install "$scope"
            elif [ -f "$requirements" ]; then
              python -m pip install -r "$requirements"
            fi
          }
          install_python_scope .
          while IFS= read -r -d '' playwright_cli; do
            node "$playwright_cli" install chromium
          done < <(find . -path '*/node_modules/@playwright/test/cli.js' -not -path './.git/*' -print0 | sort -z)
          HIVE_TARGET_DEPENDENCIES
      - &hive-repository-test-seal-checkout
        name: Stop dependency processes and verify exact tracked source
        shell: bash
        env:
          HIVE_TARGET_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          sudo pkill -KILL -u hive-target 2>/dev/null || true
          test "$(git rev-parse HEAD)" = "$HIVE_TARGET_HEAD_SHA"
          sudo git -c safe.directory="$GITHUB_WORKSPACE" diff --no-ext-diff --no-textconv --exit-code -- .
          while IFS= read -r -d '' tracked; do
            if [ -L "$tracked" ]; then
              sudo chown -h root:root -- "$tracked"
            else
              sudo chown root:root -- "$tracked"
              sudo chmod a-w -- "$tracked"
            fi
            directory="$(dirname -- "$tracked")"
            while :; do
              sudo chown root:root -- "$directory"
              sudo chmod 1777 -- "$directory"
              if [ "$directory" = "." ]; then
                break
              fi
              directory="$(dirname -- "$directory")"
            done
          done < <(git ls-files -z)
      - name: Execute exact repository test command
        shell: bash
        run: |
          set -euo pipefail
          sudo -u hive-target -- env -i -C "$HIVE_TARGET_WORKSPACE" HOME=/home/hive-target PATH="/home/hive-target/.local/bin:/home/hive-target/.venv/bin:$PATH" LANG=C.UTF-8 CI=true PLAYWRIGHT_BROWSERS_PATH=/home/hive-target/.cache/ms-playwright HIVE_TARGET_WORKSPACE="$HIVE_TARGET_WORKSPACE" HIVE_TARGET_PROCESS=1 npm run build
      - &hive-repository-test-cleanup
        name: Terminate isolated target processes and reverify source
        if: always()
        shell: bash
        env:
          HIVE_TARGET_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          target_workspace="${HIVE_TARGET_WORKSPACE:-}"
          cleanup_target_workspace() {
            if [ -n "$target_workspace" ] && mountpoint -q "$target_workspace"; then
              sudo umount "$target_workspace" || true
            fi
          }
          trap cleanup_target_workspace EXIT
          test -n "$target_workspace"
          sudo pkill -KILL -u hive-target 2>/dev/null || true
          test "$(git rev-parse HEAD)" = "$HIVE_TARGET_HEAD_SHA"
          git diff --no-ext-diff --no-textconv --exit-code -- .
          sudo umount "$target_workspace"
          trap - EXIT
          if mountpoint -q "$target_workspace"; then
            echo "Isolated target workspace remained mounted" >&2
            exit 1
          fi

  repository-test-002:
    name: Hive repository test 002
    needs: setup-authorization
    if: ${{ github.event_name == 'pull_request' && needs.setup-authorization.outputs.operation != 'uninstall' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - *hive-repository-test-checkout
      - *hive-repository-test-setup-node
      - *hive-repository-test-setup-python
      - *hive-repository-test-prepare-account
      - *hive-repository-test-provision-tools
      - *hive-repository-test-install-dependencies
      - *hive-repository-test-seal-checkout
      - name: Execute exact repository test command
        shell: bash
        run: |
          set -euo pipefail
          sudo -u hive-target -- env -i -C "$HIVE_TARGET_WORKSPACE" HOME=/home/hive-target PATH="/home/hive-target/.local/bin:/home/hive-target/.venv/bin:$PATH" LANG=C.UTF-8 CI=true PLAYWRIGHT_BROWSERS_PATH=/home/hive-target/.cache/ms-playwright HIVE_TARGET_WORKSPACE="$HIVE_TARGET_WORKSPACE" HIVE_TARGET_PROCESS=1 npm run build-storybook
      - *hive-repository-test-cleanup

  repository-test-003:
    name: Hive repository test 003
    needs: setup-authorization
    if: ${{ github.event_name == 'pull_request' && needs.setup-authorization.outputs.operation != 'uninstall' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - *hive-repository-test-checkout
      - *hive-repository-test-setup-node
      - *hive-repository-test-setup-python
      - *hive-repository-test-prepare-account
      - *hive-repository-test-provision-tools
      - *hive-repository-test-install-dependencies
      - *hive-repository-test-seal-checkout
      - name: Execute exact repository test command
        shell: bash
        run: |
          set -euo pipefail
          sudo -u hive-target -- env -i -C "$HIVE_TARGET_WORKSPACE" HOME=/home/hive-target PATH="/home/hive-target/.local/bin:/home/hive-target/.venv/bin:$PATH" LANG=C.UTF-8 CI=true PLAYWRIGHT_BROWSERS_PATH=/home/hive-target/.cache/ms-playwright HIVE_TARGET_WORKSPACE="$HIVE_TARGET_WORKSPACE" HIVE_TARGET_PROCESS=1 npm run typecheck
      - *hive-repository-test-cleanup

  visual-hive-execution:
    name: visual-hive-execution
    needs: setup-authorization
    if: ${{ github.event_name == 'pull_request' && needs.setup-authorization.outputs.operation != 'uninstall' }}
    permissions:
      contents: read
      actions: read
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: DavidDiaz0317/visual-hive
          ref: 9fb0eebf4ec4c3f6653092c1fd53795d4d80523e
          path: .hive-visual-tooling
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: .hive-visual-tooling/package-lock.json
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"
      - name: Build exact Visual Hive tooling before target execution
        working-directory: .hive-visual-tooling
        shell: bash
        env:
          HIVE_VISUAL_HIVE_REF: 9fb0eebf4ec4c3f6653092c1fd53795d4d80523e
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$HIVE_VISUAL_HIVE_REF"
          npm ci
          npm run build
          test -z "$(git status --porcelain --untracked-files=no)"
      - name: Seal immutable tooling and prepare isolated target account
        shell: bash
        run: |
          set -euo pipefail
          set -euo pipefail
          for reserved_account in hive-target hive-evidence; do
            if id -u "$reserved_account" >/dev/null 2>&1; then
              echo "Reserved isolation account already exists: $reserved_account" >&2
              exit 1
            fi
          done
          sudo useradd --create-home --shell /bin/bash hive-target
          sudo useradd --create-home --shell /usr/sbin/nologin hive-evidence
          sudo install -d -o hive-target -g hive-target -m 0755 /home/hive-target/.local/bin /home/hive-target/.cache
          sudo install -d -o hive-evidence -g hive-evidence -m 0700 /home/hive-evidence/.cache /home/hive-evidence/.cache/tmp
          sudo chmod 0700 /home/hive-evidence
          python_bin="$(command -v python)"
          (cd / && sudo -u hive-target -- env -i HOME=/home/hive-target PATH="$PATH" "$python_bin" -I -m venv /home/hive-target/.venv)
          target_root="/opt/hive-target"
          target_workspace="/opt/hive-target/workspace"
          trusted_root="/opt/hive-target/trusted"
          test ! -e "$target_root"
          sudo install -d -o root -g root -m 0755 "$target_root" "$target_workspace" "$trusted_root"
          test -d "$GITHUB_WORKSPACE"
          test ! -L "$GITHUB_WORKSPACE"
          test "$(readlink -f "$GITHUB_WORKSPACE")" = "$GITHUB_WORKSPACE"
          sudo chown -R hive-target:hive-target "$GITHUB_WORKSPACE"
          test -d .git
          test ! -L .git
          test -f visual-hive.config.yaml
          test ! -L visual-hive.config.yaml
          sudo chown -R root:root .git
          sudo chmod -R a-w .git
          sudo chown root:root visual-hive.config.yaml
          sudo chmod 0444 visual-hive.config.yaml
          sudo chmod 1777 "$GITHUB_WORKSPACE"
          sudo mount --bind "$GITHUB_WORKSPACE" "$target_workspace"
          mountpoint -q "$target_workspace"
          test "$(stat -Lc '%d:%i' "$target_workspace")" = "$(stat -Lc '%d:%i' "$GITHUB_WORKSPACE")"
          echo "HIVE_TARGET_WORKSPACE=$target_workspace" >> "$GITHUB_ENV"
          trusted_tooling="/opt/hive-target/trusted/visual-hive-tooling"
          sudo mv .hive-visual-tooling "$trusted_tooling"
          cli="$trusted_tooling/packages/cli/dist/index.js"
          test -f "$cli"
          cli_sha="$(sha256sum "$cli" | cut -d ' ' -f 1)"
          trusted_node="$(readlink -f "$(command -v node)")"
          tool_cache="$(readlink -f "$RUNNER_TOOL_CACHE")"
          node_runtime="$(dirname "$(dirname "$trusted_node")")"
          test -x "$trusted_node"
          case "$node_runtime" in
            "$tool_cache"/node/*) ;;
            *) echo "setup-node resolved outside the GitHub-hosted tool cache" >&2; exit 1 ;;
          esac
          sudo chown -R root:root "$node_runtime"
          sudo chmod -R a-w "$node_runtime"
          trusted_node_sha="$(sha256sum "$trusted_node" | cut -d ' ' -f 1)"
          echo "VISUAL_HIVE_CLI=$cli" >> "$GITHUB_ENV"
          echo "HIVE_VISUAL_HIVE_CLI_SHA=$cli_sha" >> "$GITHUB_ENV"
          echo "HIVE_TRUSTED_NODE=$trusted_node" >> "$GITHUB_ENV"
          echo "HIVE_TRUSTED_NODE_SHA=$trusted_node_sha" >> "$GITHUB_ENV"
          sudo chown -R root:root "$trusted_tooling"
          sudo chmod -R a-w "$trusted_tooling"
          set -euo pipefail
          target_bash=/opt/hive-target/trusted/target-bash
          target_shell=/opt/hive-target/trusted/target-shell
          evidence_launcher=/opt/hive-target/trusted/run-visual-hive-evidence
          sudo install -o root -g root -m 0555 "$(readlink -f /bin/bash)" "$target_bash"
          sudo install -d -o root -g root -m 0555 /opt/hive-target/trusted/visual-hive-runtime /opt/hive-target/trusted/visual-hive-runtime/node_modules
          test "$(stat -c '%u:%g:%a' /opt/hive-target/trusted/visual-hive-runtime/node_modules)" = "0:0:555"
          target_shell_source="$RUNNER_TEMP/hive-visual-target-shell-${GITHUB_RUN_ID}"
          evidence_launcher_source="$RUNNER_TEMP/hive-visual-evidence-launcher-${GITHUB_RUN_ID}"
          rm -f -- "$target_shell_source" "$evidence_launcher_source"
