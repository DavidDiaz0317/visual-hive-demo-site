name: Visual Hive PR

on:
  pull_request:

permissions:
  contents: read

jobs:
  visual-hive:
    runs-on: ubuntu-latest
    env:
      VISUAL_HIVE_CLI: ${{ github.workspace }}/.visual-hive-tooling/packages/cli/dist/index.js
    steps:
      - name: Checkout demo repo
        uses: actions/checkout@v4

      - name: Checkout Visual Hive
        uses: actions/checkout@v4
        with:
          repository: DavidDiaz0317/visual-hive
          ref: main
          path: .visual-hive-tooling

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            .visual-hive-tooling/package-lock.json

      - name: Install and build Visual Hive
        working-directory: .visual-hive-tooling
        run: npm ci && npm run build

      - name: Install demo app
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build demo app
        run: npm run build && npm run typecheck

      - name: Visual Hive doctor
        run: npm run vh:doctor

      - name: Visual Hive plan
        run: npm run vh:plan

      - name: Seed deterministic baselines
        run: npm run vh:run:seed

      - name: Verify deterministic contracts
        run: npm run vh:run:ci

      - name: Triage and evidence
        if: always()
        # Writes .visual-hive/baselines.json before artifact upload.
        run: |
          node scripts/visual-hive-cli.mjs baselines list --config visual-hive.config.yaml --write
          npm run vh:triage
          npm run vh:evidence
          npm run vh:issues
          npm run vh:handoff
          npm run vh:mcp
          npm run vh:artifacts
          npm run vh:report -- --github-step-summary

      - name: Upload Visual Hive artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-hive-pr
          path: .visual-hive
          include-hidden-files: true
