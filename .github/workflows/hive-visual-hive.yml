            expected_executable="$(sudo -u hive-target -- env -i -C "$HIVE_TARGET_WORKSPACE" HOME=/home/hive-target PATH="/home/hive-target/.local/bin:/home/hive-target/.venv/bin:$PATH" LANG=C.UTF-8 CI=true PLAYWRIGHT_BROWSERS_PATH="$HIVE_TRUSTED_PLAYWRIGHT_BROWSERS_PATH" HIVE_TARGET_WORKSPACE="$HIVE_TARGET_WORKSPACE" HIVE_TARGET_PROCESS=1 "$HIVE_TRUSTED_NODE" -e 'const path = require("node:path"); const cli = process.argv[1]; const runtime = require(require.resolve("playwright", { paths: [path.dirname(cli)] })); process.stdout.write(runtime.chromium.executablePath())' "$playwright_cli")"
            expected_executable="$(readlink -f "$expected_executable")"
            if ! grep -Fq "$(printf 'target\t%s\t%s\t' "$playwright_cli" "$expected_executable")" "$HIVE_TRUSTED_BROWSER_MANIFEST"; then
