name: Visual Hive Issue Lifecycle

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Optional Visual Hive issue number to refresh"
        required: false
  workflow_run:
    workflows:
      - Visual Hive Live Detection
      - Visual Hive Trusted Publisher
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  lifecycle:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.VISUAL_HIVE_AUTO_PUBLISH_ISSUES == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download Visual Hive artifacts
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: visual-hive-*
          merge-multiple: true
          path: visual-hive-artifacts

      - name: Update lifecycle labels/comments
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          ARTIFACT_ROOT: visual-hive-artifacts
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const { owner, repo } = context.repo;
            const root = process.env.ARTIFACT_ROOT;
            const explicitIssue = process.env.ISSUE_NUMBER ? Number(process.env.ISSUE_NUMBER) : undefined;
            const redactSecretValues = (value) => String(value || "")
              .replace(/\bauthorization\b\s*[:=]\s*(?:bearer\s+)?[^\r\n&"']+/gi, "authorization=[REDACTED]")
              .replace(/\b(client_secret|set-cookie|cookie|token|password|secret|key|code)\b\s*[:=]\s*[^&\s"']+/gi, "$1=[REDACTED]")
              .replace(/\bbearer\s+[A-Za-z0-9._~+/=-]+/gi, "bearer [REDACTED]");
            const summary = {
              schemaVersion: "visual-hive.issue-lifecycle.workflow.v1",
              generatedAt: new Date().toISOString(),
              issuesUpdated: 0,
              commentsCreated: 0,
              mode: explicitIssue ? "explicit_issue" : "artifact_candidates"
            };
            async function ensureLabel(name) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, name, color: "ededed", description: "Managed by Visual Hive" });
              }
            }
            for (const label of ["visual-hive/still-active", "visual-hive/resolved-candidate", "visual-hive/suppressed"]) {
              await ensureLabel(label);
            }
            const bodyMarker = "<!-- visual-hive-lifecycle-status -->";
            async function refreshIssue(issueNumber, status) {
              const label = status === "resolved_candidate" ? "visual-hive/resolved-candidate" : status === "suppressed" ? "visual-hive/suppressed" : "visual-hive/still-active";
              await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: [label] });
              const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: issueNumber, per_page: 100 });
              const body = redactSecretValues(`${bodyMarker}\nVisual Hive lifecycle refresh: **${status}**.\n\nVisual Hive does not auto-close issues by default. Rerun the validation command in the issue body before changing lifecycle state.`);
              const previous = comments.find((comment) => comment.body && comment.body.includes(bodyMarker));
              if (previous) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body });
                summary.commentsCreated += 1;
              }
              summary.issuesUpdated += 1;
            }
            if (explicitIssue) {
              await refreshIssue(explicitIssue, "still_active");
            } else {
              function walk(dir) {
                if (!fs.existsSync(dir)) return [];
                return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
                  const full = path.join(dir, entry.name);
                  return entry.isDirectory() ? walk(full) : [full];
                });
              }
              const issuesPath = walk(root).find((file) => path.basename(file) === "issues.json");
              if (issuesPath) {
                const report = JSON.parse(fs.readFileSync(issuesPath, "utf8"));
                const candidates = (report.issues || []).filter((issue) => issue.dedupeFingerprint);
                const existing = await github.paginate(github.rest.issues.listForRepo, { owner, repo, labels: "visual-hive", state: "open", per_page: 100 });
                for (const candidate of candidates) {
                  const match = existing.find((issue) => issue.body && issue.body.includes(candidate.dedupeFingerprint));
                  if (match) {
                    await refreshIssue(match.number, candidate.status === "resolved_candidate" ? "resolved_candidate" : "still_active");
                  }
                }
              }
            }
            fs.mkdirSync("visual-hive-lifecycle-summary", { recursive: true });
            fs.writeFileSync("visual-hive-lifecycle-summary/issue-lifecycle-summary.json", `${redactSecretValues(JSON.stringify(summary, null, 2))}\n`);

      - name: Upload lifecycle summary
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-hive-issue-lifecycle-summary
          path: visual-hive-lifecycle-summary
          if-no-files-found: ignore
          include-hidden-files: true
