name: Hive Visual Import Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "41 5 * * 2"

permissions:
  contents: read

jobs:
  hive-visual-import-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VISUAL_HIVE_CLI: ${{ github.workspace }}/.visual-hive-tooling/packages/cli/dist/index.js
    steps:
      - name: Checkout demo repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout Visual Hive
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: DavidDiaz0317/visual-hive
          ref: 59ca827ea5955bcd4459eb9ae203e9703533226a
          path: .visual-hive-tooling

      - name: Checkout Hive fork integration
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: DavidDiaz0317/hive
          ref: e46286247190a06c1a9c195e6a82c4bbc54ef60a
          path: .hive-tooling

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            .visual-hive-tooling/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: .hive-tooling/v2/go.mod
          cache-dependency-path: .hive-tooling/v2/go.sum

      - name: Install and build Visual Hive
        working-directory: .visual-hive-tooling
        run: npm ci && npm run build

      - name: Move Visual Hive tooling outside client scan path
        run: |
          mv .visual-hive-tooling "$RUNNER_TEMP/visual-hive-tooling"
          echo "VISUAL_HIVE_CLI=$RUNNER_TEMP/visual-hive-tooling/packages/cli/dist/index.js" >> "$GITHUB_ENV"

      - name: Install demo app and browsers
        run: npm ci && npx playwright install --with-deps chromium

      - name: Generate Visual Hive deterministic evidence
        run: |
          npm run build
          npm run typecheck
          npm run vh:doctor
          npm run vh:analyze
          npm run vh:graph:impact
          npm run vh:plan
          npm run vh:run:ci
          npm run vh:mutate
          npm run vh:triage
          npm run vh:evidence
          npm run vh:issues
          npm run vh:handoff
          # Writes .visual-hive/baselines.json before artifact upload.
          node "$VISUAL_HIVE_CLI" baselines list --config visual-hive.config.yaml --write
          npm run vh:report -- --github-step-summary

      - name: Generate Hive import bundle
        run: |
          npm run vh:hive-export
          npm run vh:hive-beads
          npm run vh:hive-validate
          npm run vh:hive-setup-pack
          npm run vh:hive-integration-smoke
          npm run vh:hive-bundle

      - name: Build Hive fork and import Visual Hive bundle
        shell: bash
        run: |
          go build -o "$RUNNER_TEMP/hive" ./cmd/hive
          bundle_manifest="$(find "$GITHUB_WORKSPACE/.visual-hive/bundles" -name manifest.json -type f | head -n 1)"
          test -n "$bundle_manifest"
          "$RUNNER_TEMP/hive" visual import validate --bundle "$bundle_manifest" --max-acmm 5 | tee "$GITHUB_WORKSPACE/.visual-hive/hive-import-validation.json"
          "$RUNNER_TEMP/hive" visual import apply --bundle "$bundle_manifest" --max-acmm 5 --beads-dir "$GITHUB_WORKSPACE/.visual-hive/hive-imported-beads" | tee "$GITHUB_WORKSPACE/.visual-hive/hive-import-first.json"
          "$RUNNER_TEMP/hive" visual import apply --bundle "$bundle_manifest" --max-acmm 5 --beads-dir "$GITHUB_WORKSPACE/.visual-hive/hive-imported-beads" | tee "$GITHUB_WORKSPACE/.visual-hive/hive-import-second.json"
          node -e 'const fs=require("fs"),p=require("path"),r=process.env.GITHUB_WORKSPACE; const first=JSON.parse(fs.readFileSync(p.join(r,".visual-hive/hive-import-first.json"))); const second=JSON.parse(fs.readFileSync(p.join(r,".visual-hive/hive-import-second.json"))); if (!first.applied || first.created < 1 || second.created !== 0 || second.skipped !== first.created) process.exit(1);'
        working-directory: .hive-tooling/v2

      - name: Verify published artifact safety and inventory
        run: |
          npm run vh:path-scan
          npm run vh:artifacts

      - name: Upload Visual Hive artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hive-visual-import-smoke
          path: .visual-hive
          include-hidden-files: true

      # This workflow imports into an ephemeral real Hive bead store and proves
      # idempotency. It performs no live issue creation or production Hive write.
