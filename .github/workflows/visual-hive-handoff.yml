name: Visual Hive Handoff

on:
  workflow_run:
    workflows:
      - Visual Hive PR
      - Visual Hive Scheduled
      - Visual Hive Full Run
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  trusted-handoff:
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Visual Hive artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: visual-hive-*
          merge-multiple: true
          path: visual-hive-artifacts

      - name: Create or update scoped Visual Hive issue candidate
        if: ${{ vars.VISUAL_HIVE_AUTO_PUBLISH_ISSUES == 'true' }}
        uses: actions/github-script@v7
        env:
          ARTIFACT_ROOT: visual-hive-artifacts
          ISSUE_KIND: missing_visual_coverage
          ISSUE_LIMIT: "1"
          RESULT_PATH: trusted-issue-publish-result.json
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const root = process.env.ARTIFACT_ROOT;
            const issueKind = process.env.ISSUE_KIND;
            const limit = Number(process.env.ISSUE_LIMIT || "1");
            const resultPath = process.env.RESULT_PATH;
            const authorizationPattern = /\bauthorization\b\s*[:=]\s*(?:bearer\s+)?[^\r\n&"']+/gi;
            const secretPattern = /\b(client_secret|set-cookie|cookie|token|password|secret|key|code)\b\s*[:=]\s*[^&\s"']+/gi;
            const bearerPattern = /\bbearer\s+[A-Za-z0-9._~+/=-]+/gi;
            const sanitizeText = (value) => String(value || "")
              .replace(authorizationPattern, "authorization=[REDACTED]")
              .replace(secretPattern, "$1=[REDACTED]")
              .replace(bearerPattern, "bearer [REDACTED]");
            const sanitizeJson = (value) => JSON.parse(sanitizeText(JSON.stringify(value)));
            const walkArtifacts = (dir) => {
              if (!fs.existsSync(dir)) return [];
              return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
                const fullPath = path.join(dir, entry.name);
                return entry.isDirectory() ? walkArtifacts(fullPath) : [fullPath];
              });
            };
            const findArtifact = (name) => walkArtifacts(root).find((file) => path.basename(file) === name);
            const writeResult = (result) => {
              fs.writeFileSync(resultPath, JSON.stringify(sanitizeJson(result), null, 2) + "\n", "utf8");
            };
            const baseResult = {
              schemaVersion: "visual-hive.issue-publish-result.v1",
              generatedAt: new Date().toISOString(),
              project: "visual-hive-demo-site",
              mode: "live",
              status: "blocked",
              externalCallsMade: 0,
              networkCallsMade: 0,
              realGithubIssuesCreated: 0,
              realGithubIssuesUpdated: 0,
              blockedReasons: [],
              decisions: [],
              createdIssues: [],
              updatedIssues: []
            };
            const issuesPath = findArtifact("issues.json");
            if (!issuesPath) {
              writeResult({ ...baseResult, blockedReasons: ["No issues.json artifact found."] });
              core.info("No issues.json artifact found; nothing to publish.");
              return;
            }
            const validationPath = findArtifact("hive-handoff-validation.json");
            if (!validationPath) {
              writeResult({ ...baseResult, blockedReasons: ["No hive-handoff-validation.json artifact found."] });
              core.info("No handoff validation artifact found; refusing issue publication.");
              return;
            }
            const validation = JSON.parse(fs.readFileSync(validationPath, "utf8"));
            if (validation.status === "blocked" || validation.summary?.externalCallsMade !== 0) {
              writeResult({ ...baseResult, blockedReasons: ["Handoff validation is blocked or reports prior external calls."] });
              core.info("Handoff validation is blocked; refusing issue publication.");
              return;
            }
            const report = JSON.parse(fs.readFileSync(issuesPath, "utf8"));
            if (report.externalCallsMade !== 0 || report.networkCallsMade !== 0) {
              writeResult({ ...baseResult, blockedReasons: ["issues.json was not produced by a no-network Visual Hive run."] });
              core.info("issues.json reports prior external/network calls; refusing issue publication.");
              return;
            }
            const candidates = (report.issues || [])
              .filter((issue) => issue.status === "open_candidate" || issue.status === "update_candidate")
              .filter((issue) => !issueKind || issue.issueKind === issueKind)
              .slice(0, Math.max(0, limit));
            if (!candidates.length) {
              writeResult({ ...baseResult, status: "dry_run_written", blockedReasons: [], decisions: [] });
              core.info("No matching issue candidates found.");
              return;
            }
            const { owner, repo } = context.repo;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              labels: "visual-hive",
              state: "open",
              per_page: 100
            });
            const decisions = [];
            const createdIssues = [];
            const updatedIssues = [];
            let externalCallsMade = 1;
            let networkCallsMade = 1;
            for (const candidate of candidates) {
              const dedupe = candidate.dedupeFingerprint;
              const body = sanitizeText(candidate.body);
              const labels = Array.from(new Set([...(candidate.labels || []), "visual-hive"]));
              const match = existing.find((issue) => issue.body && issue.body.includes(dedupe));
              if (match) {
                const updated = await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: match.number,
                  title: candidate.title,
                  body,
                  labels
                });
                externalCallsMade += 1;
                networkCallsMade += 1;
                const ref = {
                  number: updated.data.number,
                  url: updated.data.html_url,
                  dedupeFingerprint: dedupe,
                  title: updated.data.title,
                  labels
                };
                updatedIssues.push(ref);
                decisions.push({
                  dedupeFingerprint: dedupe,
                  issueKind: candidate.issueKind,
                  title: candidate.title,
                  status: candidate.status,
                  severity: candidate.severity,
                  action: "update",
                  reason: "Existing issue matches dedupe fingerprint.",
                  labels,
                  owningAgentHint: candidate.owningAgentHint,
                  validationCommand: candidate.validationCommand,
                  targetIssue: ref,
                  body
                });
                core.info(`Updated Visual Hive issue #${updated.data.number}`);
              } else {
                const created = await github.rest.issues.create({
                  owner,
                  repo,
                  title: candidate.title,
                  body,
                  labels
                });
                externalCallsMade += 1;
                networkCallsMade += 1;
                const ref = {
                  number: created.data.number,
                  url: created.data.html_url,
                  dedupeFingerprint: dedupe,
                  title: created.data.title,
                  labels
                };
                createdIssues.push(ref);
                decisions.push({
                  dedupeFingerprint: dedupe,
                  issueKind: candidate.issueKind,
                  title: candidate.title,
                  status: candidate.status,
                  severity: candidate.severity,
                  action: "create",
                  reason: "No existing issue matched dedupe fingerprint.",
                  labels,
                  owningAgentHint: candidate.owningAgentHint,
                  validationCommand: candidate.validationCommand,
                  targetIssue: ref,
                  body
                });
                core.info(`Created Visual Hive issue #${created.data.number}`);
              }
            }
            writeResult({
              ...baseResult,
              status: "published",
              externalCallsMade,
              networkCallsMade,
              realGithubIssuesCreated: createdIssues.length,
              realGithubIssuesUpdated: updatedIssues.length,
              blockedReasons: [],
              decisions,
              createdIssues,
              updatedIssues
            });

      - name: Create or update sanitized Visual Hive issue
        if: ${{ vars.VISUAL_HIVE_AUTO_PUBLISH_ISSUES == 'true' }}
        uses: actions/github-script@v7
        env:
          ARTIFACT_ROOT: visual-hive-artifacts
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const root = process.env.ARTIFACT_ROOT;
            const authorizationPattern = /\bauthorization\b\s*[:=]\s*(?:bearer\s+)?[^\r\n&"']+/gi;
            const secretPattern = /\b(client_secret|set-cookie|cookie|token|password|secret|key|code)\b\s*[:=]\s*[^&\s"']+/gi;
            const bearerPattern = /\bbearer\s+[A-Za-z0-9._~+/=-]+/gi;
            const sanitizeText = (value) => String(value || "")
              .replace(authorizationPattern, "authorization=[REDACTED]")
              .replace(secretPattern, "$1=[REDACTED]")
              .replace(bearerPattern, "bearer [REDACTED]");
            const walkArtifacts = (dir) => {
              if (!fs.existsSync(dir)) return [];
              return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
                const fullPath = path.join(dir, entry.name);
                return entry.isDirectory() ? walkArtifacts(fullPath) : [fullPath];
              });
            };
            const findArtifact = (name) => walkArtifacts(root).find((file) => path.basename(file) === name);
            const issuePath = findArtifact("hive-issue.md");
            const validationPath = findArtifact("hive-handoff-validation.json");
            const requiredHandoffArtifacts = [
              "evidence-packet.json",
              "handoff.json",
              "hive-bead-request.json",
              "hive-handoff-result.json",
              "hive-export.json",
              "guarded-repair-preview.json",
              "repair-request-envelope.json",
              "trusted-repair-consumer-summary.json",
              "trusted-repair-workflow-dry-run.json"
            ];
            for (const artifactName of requiredHandoffArtifacts) {
              if (!findArtifact(artifactName)) {
                core.info(`Optional Visual Hive handoff artifact not found: ${artifactName}`);
              }
            }
            if (!issuePath || !fs.existsSync(issuePath)) {
              core.info("No hive-issue.md artifact found; nothing to hand off.");
              return;
            }
            if (validationPath && fs.existsSync(validationPath)) {
              const validation = JSON.parse(fs.readFileSync(validationPath, "utf8"));
              if (validation.summary?.externalCallsMade !== 0) {
                throw new Error("Refusing issue handoff: validation artifact reports external calls.");
              }
            }
            const body = sanitizeText(fs.readFileSync(issuePath, "utf8"));
            const markers = ["<!-- visual-hive-handoff", "<!-- visual-hive-hive-handoff"];
            const hasMarker = markers.some((marker) => body.includes(marker));
            if (!hasMarker) {
              throw new Error("Refusing issue handoff: missing Visual Hive handoff marker.");
            }
            const dedupeSignature =
              body.match(/visual-hive-hive-handoff-dedupe:[^\\s<]+/)?.[0] ||
              body.match(/Dedupe fingerprint:\\s*([^\\s]+)/)?.[1] ||
              "visual-hive-hive-handoff-dedupe:default";
            const title = "[Visual Hive] Evidence handoff from trusted workflow";
            const { owner, repo } = context.repo;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              labels: "visual-hive,hive/quality",
              state: "open",
              per_page: 100
            });
            const match = existing.find(
              (issue) => issue.body?.includes(dedupeSignature) || markers.some((marker) => issue.body?.includes(marker))
            );
            if (match) {
              await github.rest.issues.update({ owner, repo, issue_number: match.number, title, body });
              core.info(`Updated Visual Hive handoff issue #${match.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["visual-hive", "hive/quality", "ai-ready"]
              });
              core.info(`Created Visual Hive handoff issue #${created.data.number}`);
            }

      # This trusted workflow consumes uploaded sanitized artifacts only.
      # It intentionally does not checkout or execute pull request code.
      # Live issue publication is disabled unless VISUAL_HIVE_AUTO_PUBLISH_ISSUES=true
      # is set as an explicit repository variable in this trusted workflow context.

      - name: Upload trusted issue publish result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-hive-trusted-issue-publish-result
          path: trusted-issue-publish-result.json
          if-no-files-found: ignore
