name: Visual Hive Handoff

on:
  workflow_run:
    workflows:
      - Visual Hive PR
      - Visual Hive Scheduled
    types:
      - completed

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  trusted-handoff:
    if: ${{ github.event.workflow_run.conclusion == 'failure' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download Visual Hive artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          pattern: visual-hive-*
          merge-multiple: true
          path: visual-hive-artifacts

      - name: Create or update sanitized Visual Hive issue
        uses: actions/github-script@v7
        env:
          ARTIFACT_ROOT: visual-hive-artifacts
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const root = process.env.ARTIFACT_ROOT;
            const secretPattern = /(client_secret|set-cookie|authorization|bearer|cookie|token|password|secret|key|code)=?[: ]?[^&\s"']+/gi;
            const sanitizeText = (value) => String(value || "").replace(secretPattern, "$1=[REDACTED]");
            const walkArtifacts = (dir) => {
              if (!fs.existsSync(dir)) return [];
              return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
                const fullPath = path.join(dir, entry.name);
                return entry.isDirectory() ? walkArtifacts(fullPath) : [fullPath];
              });
            };
            const findArtifact = (name) => walkArtifacts(root).find((file) => path.basename(file) === name);
            const issuePath = findArtifact("hive-issue.md");
            const validationPath = findArtifact("hive-handoff-validation.json");
            const requiredHandoffArtifacts = [
              "evidence-packet.json",
              "handoff.json",
              "hive-bead-request.json",
              "hive-handoff-result.json",
              "hive-export.json",
              "guarded-repair-preview.json",
              "repair-request-envelope.json",
              "trusted-repair-consumer-summary.json",
              "trusted-repair-workflow-dry-run.json"
            ];
            for (const artifactName of requiredHandoffArtifacts) {
              if (!findArtifact(artifactName)) {
                core.info(`Optional Visual Hive handoff artifact not found: ${artifactName}`);
              }
            }
            if (!issuePath || !fs.existsSync(issuePath)) {
              core.info("No hive-issue.md artifact found; nothing to hand off.");
              return;
            }
            if (validationPath && fs.existsSync(validationPath)) {
              const validation = JSON.parse(fs.readFileSync(validationPath, "utf8"));
              if (validation.summary?.externalCallsMade !== 0) {
                throw new Error("Refusing issue handoff: validation artifact reports external calls.");
              }
            }
            const body = sanitizeText(fs.readFileSync(issuePath, "utf8"));
            const marker = "<!-- visual-hive-handoff";
            if (!body.includes(marker)) {
              throw new Error("Refusing issue handoff: missing Visual Hive handoff marker.");
            }
            const dedupeSignature = body.match(/visual-hive-hive-handoff-dedupe:[^\\s<]+/)?.[0] || "visual-hive-hive-handoff-dedupe:default";
            const title = "[Visual Hive] Evidence handoff from trusted workflow";
            const { owner, repo } = context.repo;
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              labels: "visual-hive,hive/quality",
              state: "open",
              per_page: 100
            });
            const match = existing.find((issue) => issue.body?.includes(dedupeSignature) || issue.body?.includes(marker));
            if (match) {
              await github.rest.issues.update({ owner, repo, issue_number: match.number, title, body });
              core.info(`Updated Visual Hive handoff issue #${match.number}`);
            } else {
              const created = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["visual-hive", "hive/quality", "ai-ready"]
              });
              core.info(`Created Visual Hive handoff issue #${created.data.number}`);
            }

      # This trusted workflow consumes uploaded sanitized artifacts only.
      # It intentionally does not checkout or execute pull request code.
