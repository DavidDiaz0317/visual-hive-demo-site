name: Visual Hive Scheduled

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

jobs:
  visual-hive-scheduled:
    runs-on: ubuntu-latest
    env:
      VISUAL_HIVE_CLI: ${{ github.workspace }}/.visual-hive-tooling/packages/cli/dist/index.js
    steps:
      - name: Checkout demo repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout Visual Hive
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: DavidDiaz0317/visual-hive
          ref: main
          path: .visual-hive-tooling

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install and build Visual Hive
        working-directory: .visual-hive-tooling
        run: npm ci && npm run build

      - name: Move Visual Hive tooling outside client scan path
        run: |
          mv .visual-hive-tooling "$RUNNER_TEMP/visual-hive-tooling"
          echo "VISUAL_HIVE_CLI=$RUNNER_TEMP/visual-hive-tooling/packages/cli/dist/index.js" >> "$GITHUB_ENV"

      - name: Install and build demo app
        run: npm ci && npx playwright install --with-deps chromium && npm run build && npm run typecheck

      - name: Run scheduled Visual Hive evidence chain
        run: |
          # Writes .visual-hive/baselines.json before artifact upload.
          npm run vh:full-run
          npm run vh:graph:search
          npm run vh:graph:impact
          node scripts/visual-hive-cli.mjs baselines list --config visual-hive.config.yaml --write
          npm run vh:mutate
          npm run vh:mutation-proof
          npm run vh:coverage
          npm run vh:provider-upload
          npm run vh:issues
          npm run vh:issues:publish
          npm run vh:handoff-validate
          npm run vh:github-app:artifact-smoke
          npm run vh:mcp:smoke
          npm run vh:agent:issue
          npm run vh:agent:validate
          npm run vh:agent:write-preview
          npm run vh:snapshot
          npm run vh:report -- --github-step-summary

      - name: Upload Visual Hive artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-hive-scheduled
          path: .visual-hive
          include-hidden-files: true

      # Optional future provider/protected lanes can reference trusted secrets here,
      # but external provider/Hive API calls are disabled by default in this repo.
