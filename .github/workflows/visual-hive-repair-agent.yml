name: Visual Hive Repair Agent

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Visual Hive issue number to create a holdgated repair PR for"
        required: true
  issues:
    types:
      - labeled

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  repair-agent:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        contains(github.event.issue.labels.*.name, 'visual-hive') &&
        contains(github.event.issue.labels.*.name, 'visual-hive/ready-for-repair') &&
        github.event.label.name == 'visual-hive/ready-for-repair'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Prepare repair branch content
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          ISSUE_NUMBER: ${{ inputs.issue_number || github.event.issue.number }}
        with:
          script: |
            const fs = require("node:fs");
            const path = require("node:path");
            const { owner, repo } = context.repo;
            const issue_number = Number(process.env.ISSUE_NUMBER);
            const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number });
            if (!issue.body?.includes("visual-hive-issue dedupe:")) {
              core.setFailed("Issue body does not contain a Visual Hive dedupe fingerprint.");
              return;
            }
            if (issue.body.includes("visual-hive/suppressed") || issue.labels.some((label) => label.name === "visual-hive/resolved-candidate")) {
              core.setFailed("Refusing repair PR for suppressed or resolved-candidate issue.");
              return;
            }
            const dedupe = issue.body.match(/visual-hive-issue dedupe:([^ ]+) -->/)?.[1] ?? `issue-${issue_number}`;
            const short = dedupe.replace(/[^a-zA-Z0-9-]+/g, "-").slice(-32);
            const seed = issue.body.match(/visual-hive-seeded-finding:([^ ]+) -->/)?.[1] ?? "unknown";
            const branch = `visual-hive/repair/${short}`;
            const dir = path.join("docs", "live-loop", "repairs");
            fs.mkdirSync(dir, { recursive: true });
            const file = path.join(dir, `${short}.md`);
            const body = [
              `# Visual Hive Repair Work Order ${short}`,
              "",
              `- Source issue: #${issue_number}`,
              `- Dedupe fingerprint: ${dedupe}`,
              `- Seeded finding: ${seed}`,
              "- Repair mode: holdgated deterministic work-order PR",
              "- Validation command: `npm run vh:plan && npm run vh:run:ci`",
              "",
              "## Guardrails",
              "",
              "- Do not approve baselines blindly.",
              "- Do not weaken screenshot thresholds, selector contracts, mutation thresholds, or workflow safety gates.",
              "- Visual Hive remains the deterministic validation layer.",
              "- This PR is a repair work-order handoff and must be reviewed before merge.",
              "",
              "## Next Human/Hive Action",
              "",
              "Inspect the linked issue evidence, implement the UI/config repair if appropriate, and rerun Visual Hive validation before removing the hold label.",
              ""
            ].join("\n");
            fs.writeFileSync(file, body);
            fs.mkdirSync(".visual-hive/repair-agent", { recursive: true });
            fs.writeFileSync(".visual-hive/repair-agent/repair-plan.json", `${JSON.stringify({ issueNumber: issue_number, dedupe, seed, branch, file, validationCommand: "npm run vh:plan && npm run vh:run:ci", pullRequestsOpened: 0, pushesPerformed: 0 }, null, 2)}\n`);
            core.exportVariable("VISUAL_HIVE_REPAIR_BRANCH", branch);
            core.exportVariable("VISUAL_HIVE_REPAIR_FILE", file);
            core.exportVariable("VISUAL_HIVE_SOURCE_ISSUE", String(issue_number));

      - name: Commit repair work order
        run: |
          git config user.name "visual-hive-repair-agent"
          git config user.email "visual-hive-repair-agent@users.noreply.github.com"
          git checkout -B "$VISUAL_HIVE_REPAIR_BRANCH"
          git add "$VISUAL_HIVE_REPAIR_FILE" .visual-hive/repair-agent/repair-plan.json
          git commit -m "Add Visual Hive repair work order for issue #$VISUAL_HIVE_SOURCE_ISSUE"
          git push --force-with-lease origin "$VISUAL_HIVE_REPAIR_BRANCH"

      - name: Open holdgated repair PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          VISUAL_HIVE_REPAIR_BRANCH: ${{ env.VISUAL_HIVE_REPAIR_BRANCH }}
          VISUAL_HIVE_SOURCE_ISSUE: ${{ env.VISUAL_HIVE_SOURCE_ISSUE }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const head = process.env.VISUAL_HIVE_REPAIR_BRANCH;
            const sourceIssue = process.env.VISUAL_HIVE_SOURCE_ISSUE;
            for (const name of ["visual-hive", "visual-hive/repair", "hold"]) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner, repo, name, color: "ededed", description: "Managed by Visual Hive" });
              }
            }
            const existing = await github.paginate(github.rest.pulls.list, { owner, repo, state: "open", head: `${owner}:${head}`, per_page: 100 });
            const body = [
              `Links #${sourceIssue}`,
              "",
              "This is a holdgated Visual Hive repair work-order PR.",
              "",
              "Validation command:",
              "",
              "```bash",
              "npm run vh:plan && npm run vh:run:ci",
              "```",
              "",
              "Guardrails: do not approve baselines blindly and do not weaken thresholds or selector contracts to hide the finding."
            ].join("\n");
            const pr = existing[0] ?? (await github.rest.pulls.create({ owner, repo, title: `[Visual Hive repair] Issue #${sourceIssue}`, head, base: "main", body })).data;
            await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: ["visual-hive", "visual-hive/repair", "hold"] });
            await github.rest.issues.createComment({ owner, repo, issue_number: Number(sourceIssue), body: `Visual Hive repair agent opened/updated holdgated PR #${pr.number}.` });
