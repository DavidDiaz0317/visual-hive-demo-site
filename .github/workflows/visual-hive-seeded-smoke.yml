name: Visual Hive Seeded Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seeded-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout demo site
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Checkout Visual Hive
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          repository: DavidDiaz0317/visual-hive
          ref: main
          path: visual-hive-tooling

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - name: Build Visual Hive
        run: |
          npm ci
          npm run build
        working-directory: visual-hive-tooling

      - name: Install demo dependencies
        run: npm ci

      - name: Run seeded issue smoke only
        env:
          VISUAL_HIVE_CLI: visual-hive-tooling/packages/cli/dist/index.js
        run: |
          npm run vh:live-seeded-issues
          npm run vh:path-scan

      - name: Upload seeded smoke artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: visual-hive-seeded-smoke
          path: .visual-hive
          if-no-files-found: error
          include-hidden-files: true
