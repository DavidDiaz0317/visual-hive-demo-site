name: Visual Hive Production Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      VISUAL_HIVE_CLI: ${{ github.workspace }}/.visual-hive-tooling/packages/cli/dist/index.js
    steps:
      - name: Checkout demo repo
        uses: actions/checkout@v4

      - name: Checkout Visual Hive
        uses: actions/checkout@v4
        with:
          repository: DavidDiaz0317/visual-hive
          ref: main
          path: .visual-hive-tooling

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            .visual-hive-tooling/package-lock.json

      - name: Install and build Visual Hive
        working-directory: .visual-hive-tooling
        run: npm ci && npm run build

      - name: Move Visual Hive tooling outside client scan path
        run: |
          mv .visual-hive-tooling "$RUNNER_TEMP/visual-hive-tooling"
          echo "VISUAL_HIVE_CLI=$RUNNER_TEMP/visual-hive-tooling/packages/cli/dist/index.js" >> "$GITHUB_ENV"

      - name: Install demo app and browsers
        run: npm ci && npx playwright install --with-deps chromium

      - name: Run Visual Hive production smoke
        run: npm run vh:production-smoke

      - name: Prove GitHub App artifact ingestion
        run: npm run vh:github-app:artifact-smoke

      - name: Generate baseline review and step summary
        if: always()
        run: |
          # Writes .visual-hive/baselines.json; equivalent to visual-hive baselines list --write.
          npm run vh:baselines || true
          npm run vh:report -- --github-step-summary || true

      - name: Upload Visual Hive artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-hive-production-smoke
          path: .visual-hive
          include-hidden-files: true
